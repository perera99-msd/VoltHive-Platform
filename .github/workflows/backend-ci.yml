name: VoltHive Backend CI/CD

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'volthive-backend/**'
  pull_request:
    branches: [ "develop" ]
    paths:
      - 'volthive-backend/**'

jobs:
  # -------------------------------------------
  # JOB 1: Code Verification & Syntax Check
  # -------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'volthive-backend/package-lock.json'

    - name: Install Dependencies
      working-directory: ./volthive-backend
      run: npm ci

    - name: Check Syntax (Dry Run)
      working-directory: ./volthive-backend
      run: node --check src/server.js

  # -------------------------------------------
  # JOB 2: Docker Build & Push to Docker Hub
  # -------------------------------------------
  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-and-test # <--- CRITICAL: This tells GitHub to only run this if Job 1 passes!

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./volthive-backend
          push: true
          tags: dimalshxperera/volthive-backend:latest